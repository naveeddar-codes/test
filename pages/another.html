<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/submit" enctype="multipart/form-data" method="post">
        <label for="name-id">
            Name:
            <input type="text" name="name" id="name-id" placeholder="Name" required>
        </label>
        <br>
         <label for="email-id">
            Email:
            <input type="email" name="email" id="email-id" placeholder="someone@example.com" required>
        </label>
        <br>
        <br>
        <label for="file-id">Upload your file</label>
        <input type="file" name="file" id="file-id" required>
        <br>
        <br>
        <input type="submit">
    </form>
</body>
</html>
